services:
  ntfy:
    container_name: ntfy
    image: binwiederhier/ntfy:v2.24.0
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://ntfy.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 44680:80
    command:
      - serve
    environment:
      - TZ=${NTFY_TZ} # optional: set desired timezone
    volumes:
      # Message + attachment cache (transient, TTL'd) — tier-3, not backed up.
      - ./ntfy_cache:/var/lib/ntfy
      - ./ntfy-config:/etc/ntfy:ro
    healthcheck: # optional: remember to adapt the host:port to your environment
      test:
        [
          "CMD-SHELL",
          "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  exist:
    external: true
