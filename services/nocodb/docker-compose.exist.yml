services:
  nocodb-postgres:
    container_name: nocodb-postgres
    image: postgres:16.6
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_PASSWORD: ${NOCODB_POSTGRES_PASSWORD}
      POSTGRES_USER: ${NOCODB_POSTGRES_USER}
    volumes:
      # Postgres — tier-2 local. TODO: pg_dump → volumes/nocodb_pg_data_backup.
      - ../../volumes_local/nocodb_pg_data:/var/lib/postgresql/data
      # - ./ncpg_data:/var/lib/postgresql/data # Local volume for Postgres data
    healthcheck:
      interval: 10s
      retries: 10
      test: 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      timeout: 2s

  # UI interface at http://localhost:48080/
  nocodb:
    container_name: nocodb
    image: "nocodb/nocodb:2026.05.3"
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    depends_on:
      nocodb-postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://nocodb-postgres:5432?u=${NOCODB_POSTGRES_USER}&p=${NOCODB_POSTGRES_PASSWORD}&d=nocodb"
      NC_ADMIN_EMAIL: ${NOCODB_ADMIN_EMAIL}
      NC_ADMIN_PASSWORD: ${NOCODB_ADMIN_PASSWORD}
    # ports disabled — access via https://nocodb.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 48080:8080
    volumes:
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/nocodb_data:/usr/app/data
      # - ./nc_data:/usr/app/data # Local volume for NocoDB data

  nocodb-decree:
    container_name: nocodb-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - NOCODB_POSTGRES_USER=${NOCODB_POSTGRES_USER}
      - NOCODB_POSTGRES_PASSWORD=${NOCODB_POSTGRES_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/.decree/exist.test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/nocodb_data:/volumes/nocodb_data
    tty: false

networks:
  exist:
    external: true
