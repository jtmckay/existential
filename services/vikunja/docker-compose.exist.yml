services:
  vikunja:
    container_name: vikunja
    image: vikunja/vikunja:2.3.0
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://vikunja.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 43456:3456
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL}
      VIKUNJA_DATABASE_HOST: ${VIKUNJA_DATABASE_HOST}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DATABASE_PASSWORD}
      VIKUNJA_DATABASE_TYPE: ${VIKUNJA_DATABASE_TYPE}
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DATABASE_USER}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DATABASE_DATABASE}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: ${VIKUNJA_SERVICE_ENABLEREGISTRATION}

      # --- Authelia OIDC (Phase 2) ---
      # Provider key 'AUTHELIA' (uppercase) maps to redirect URI path segment 'authelia' (lowercase).
      # Redirect URI registered in Authelia: https://vikunja.<domain>/auth/openid/authelia
      # Local login remains enabled as a fallback.
      #
      # Internal-CA trust: Vikunja (Go) does server-side OIDC discovery against AUTHURL
      # (https://authelia.<domain>, internal CA). Go's crypto/x509 honors SSL_CERT_FILE,
      # but it REPLACES the trust store — so point it at the COMBINED bundle caddy emits
      # (system roots + internal CA), not the internal CA alone (which would break
      # Vikunja's other outbound TLS). To enable OIDC, uncomment the env line below AND
      # the ca-bundle volume mount in the volumes: block:
      # SSL_CERT_FILE: /etc/ssl/certs/ca-bundle.pem
      VIKUNJA_AUTH_OPENID_ENABLED: ${VIKUNJA_AUTH_OPENID_ENABLED}
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_NAME: ${VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_NAME}
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_AUTHURL: ${VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_AUTHURL}
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTID: ${VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTID}
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTSECRET: ${VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTSECRET}
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_SCOPE: ${VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_SCOPE}
    volumes:
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/vikunja_data:/app/vikunja/files
      # OIDC internal-CA trust — uncomment together with SSL_CERT_FILE above.
      # - ../../hosting/caddy/certs/ca-bundle.pem:/etc/ssl/certs/ca-bundle.pem:ro
    depends_on:
      vikunja-db:
        condition: service_healthy

  vikunja-db:
    container_name: vikunja-db
    image: postgres:17
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      POSTGRES_PASSWORD: ${VIKUNJA_DATABASE_PASSWORD}
      POSTGRES_USER: ${VIKUNJA_DATABASE_USER}
    volumes:
      # Postgres — tier-2 local. TODO: pg_dump → volumes/vikunja_db_data_backup.
      - ../../volumes_local/vikunja_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 2s
      start_period: 30s

  vikunja-decree:
    container_name: vikunja-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - VIKUNJA_DATABASE_USER=${VIKUNJA_DATABASE_USER}
      - VIKUNJA_DATABASE_PASSWORD=${VIKUNJA_DATABASE_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/exist.test.sh:ro,z
      - ../../src/test/exist-test.sh:/src/test/exist-test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/vikunja_data:/volumes/vikunja_data
    tty: false

networks:
  exist:
    external: true
