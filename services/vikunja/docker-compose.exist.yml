services:
  vikunja:
    container_name: vikunja
    image: vikunja/vikunja
    restart: unless-stopped
    networks:
      - exist
    ports:
      - 43456:3456
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL}
      VIKUNJA_DATABASE_HOST: ${VIKUNJA_DATABASE_HOST}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DATABASE_PASSWORD}
      VIKUNJA_DATABASE_TYPE: ${VIKUNJA_DATABASE_TYPE}
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DATABASE_USER}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DATABASE_DATABASE}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: ${VIKUNJA_SERVICE_ENABLEREGISTRATION}
    volumes:
      - vikunja_data:/app/vikunja/files
    depends_on:
      vikunja-db:
        condition: service_healthy

  vikunja-db:
    container_name: vikunja-db
    image: postgres:17
    restart: unless-stopped
    networks:
      - exist
    environment:
      POSTGRES_PASSWORD: ${VIKUNJA_DATABASE_PASSWORD}
      POSTGRES_USER: ${VIKUNJA_DATABASE_USER}
    volumes:
      - vikunja_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 2s
      start_period: 30s

  vikunja-decree:
    container_name: vikunja-decree
    build:
      context: ../../automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - VIKUNJA_DATABASE_USER=${VIKUNJA_DATABASE_USER}
      - VIKUNJA_DATABASE_PASSWORD=${VIKUNJA_DATABASE_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/routines:/work/.decree/routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - vikunja_data:/volumes/vikunja_data
    tty: false

volumes:
  vikunja_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_TRUENAS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_TRUENAS_CONTAINER_PATH}/vikunja_data"
  # Postgres on local disk — NFS has unsafe fsync/lock semantics for DBs.
  # Backed up via automations/routines/db-backup.sh → rclone remote.
  vikunja_db_data:

networks:
  exist:
    external: true
