services:
  mealie:
    container_name: mealie
    image: ghcr.io/mealie-recipes/mealie:latest
    restart: unless-stopped
    networks:
      - exist
    volumes:
      - mealie_data:/app/data/
    ports:
      - 49009:9000
    environment:
      ALLOW_SIGNUP: "false"
      LOG_LEVEL: "DEBUG"
      BASE_URL: ${MEALIE_BASE_URL}

      DB_ENGINE: postgres # Optional: 'sqlite', 'postgres'
      # =====================================
      # Postgres Config
      POSTGRES_USER: ${MEALIE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MEALIE_POSTGRES_PASSWORD}
      POSTGRES_SERVER: mealie-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mealie
      # =====================================
      # Email Configuration
      # SMTP_HOST=
      # SMTP_PORT=587
      # SMTP_FROM_NAME=Mealie
      # SMTP_AUTH_STRATEGY=TLS # Options: 'TLS', 'SSL', 'NONE'
      # SMTP_FROM_EMAIL=
      # SMTP_USER=
      # SMTP_PASSWORD=
  mealie-postgres:
    container_name: mealie-postgres
    image: postgres:17
    restart: unless-stopped
    networks:
      - exist
    environment:
      POSTGRES_PASSWORD: ${MEALIE_POSTGRES_PASSWORD}
      POSTGRES_USER: ${MEALIE_POSTGRES_USER}
    volumes:
      - mealie_pg_data:/var/lib/postgresql/data

  mealie-decree:
    container_name: mealie-decree
    build:
      context: ../../automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - MEALIE_POSTGRES_USER=${MEALIE_POSTGRES_USER}
      - MEALIE_POSTGRES_PASSWORD=${MEALIE_POSTGRES_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/routines:/work/.decree/routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - mealie_data:/volumes/mealie_data
    tty: false

volumes:
  mealie_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_TRUENAS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_TRUENAS_CONTAINER_PATH}/mealie_data"
  # Postgres on local disk — NFS has unsafe fsync/lock semantics for DBs.
  # Backed up via automations/routines/db-backup.sh → rclone remote.
  mealie_pg_data:

networks:
  exist:
    external: true
