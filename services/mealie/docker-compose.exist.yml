services:
  mealie:
    container_name: mealie
    image: ghcr.io/mealie-recipes/mealie:v3.19.2
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    volumes:
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/mealie_data:/app/data/
    # ports disabled — access via https://mealie.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 49009:9000
    environment:
      ALLOW_SIGNUP: "false"
      LOG_LEVEL: "INFO"
      BASE_URL: ${MEALIE_BASE_URL}

      DB_ENGINE: postgres # Optional: 'sqlite', 'postgres'
      # =====================================
      # Postgres Config
      POSTGRES_USER: ${MEALIE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MEALIE_POSTGRES_PASSWORD}
      POSTGRES_SERVER: mealie-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mealie
      # =====================================
      # Email Configuration
      # SMTP_HOST=
      # SMTP_PORT=587
      # SMTP_FROM_NAME=Mealie
      # SMTP_AUTH_STRATEGY=TLS # Options: 'TLS', 'SSL', 'NONE'
      # SMTP_FROM_EMAIL=
      # SMTP_USER=
      # SMTP_PASSWORD=
      # =====================================
      # Authelia OIDC (Phase 2)
      # Redirect URI registered in Authelia: https://mealie.<domain>/login
      # Local login remains enabled as a fallback (OIDC_AUTO_REDIRECT=false).
      # TLS skip-verify not available in Mealie's OIDC client; Mealie uses the
      # system CA bundle. Mount the internal CA and trust it system-wide via
      # SSL_CERT_FILE, or use the internal Docker name for token exchange only.
      # VERIFY: Mealie performs server-side discovery against OIDC_CONFIGURATION_URL,
      # which uses the internal CA cert. If TLS fails, mount the CA:
      #   - ../../hosting/caddy/certs/internal-ca.pem:/usr/local/share/ca-certificates/internal-ca.crt:ro
      # and set REQUESTS_CA_BUNDLE=/usr/local/share/ca-certificates/internal-ca.crt
      OIDC_AUTH_ENABLED: ${MEALIE_OIDC_AUTH_ENABLED}
      OIDC_SIGNUP_ENABLED: ${MEALIE_OIDC_SIGNUP_ENABLED}
      OIDC_CONFIGURATION_URL: ${MEALIE_OIDC_CONFIGURATION_URL}
      OIDC_CLIENT_ID: ${MEALIE_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${MEALIE_OIDC_CLIENT_SECRET}
      OIDC_PROVIDER_NAME: ${MEALIE_OIDC_PROVIDER_NAME}
      OIDC_AUTO_REDIRECT: ${MEALIE_OIDC_AUTO_REDIRECT}
      OIDC_ADMIN_GROUP: ${MEALIE_OIDC_ADMIN_GROUP}
      OIDC_USER_GROUP: ${MEALIE_OIDC_USER_GROUP}
  mealie-postgres:
    container_name: mealie-postgres
    image: postgres:17
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      POSTGRES_PASSWORD: ${MEALIE_POSTGRES_PASSWORD}
      POSTGRES_USER: ${MEALIE_POSTGRES_USER}
    volumes:
      # Postgres — tier-2 local. TODO: pg_dump → volumes/mealie_pg_data_backup.
      - ../../volumes_local/mealie_pg_data:/var/lib/postgresql/data

  mealie-decree:
    container_name: mealie-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - MEALIE_POSTGRES_USER=${MEALIE_POSTGRES_USER}
      - MEALIE_POSTGRES_PASSWORD=${MEALIE_POSTGRES_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/exist.test.sh:ro,z
      - ../../src/test/exist-test.sh:/src/test/exist-test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/mealie_data:/volumes/mealie_data
    tty: false

networks:
  exist:
    external: true
