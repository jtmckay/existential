services:
  appsmith:
    container_name: appsmith
    image: index.docker.io/appsmith/appsmith-ce:v1.98.1
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://appsmith.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "44080:80"
    volumes:
      # Bundles MongoDB + Redis internally — must be local (NFS corrupts WiredTiger).
      - ../../volumes_local/appsmith_data:/appsmith-stacks

  # nuke:
  #   image: node:24-alpine
  #   entrypoint: >
  #     sh -c '
  #       sleep 500
  #     '
  #   restart: "no"
  #   volumes:
  #     - appsmith_data:/appsmith-stacks

  appsmith-decree:
    container_name: appsmith-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/.decree/exist.test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      # TODO: live-dir tar of a running Mongo is not crash-consistent — replace with a
      # mongodump → volumes/appsmith_data_backup (NFS). Repointed to volumes_local for now.
      - ../../volumes_local/appsmith_data:/volumes/appsmith_data
    tty: false

networks:
  exist:
    external: true
