services:
  appsmith:
    container_name: appsmith
    image: index.docker.io/appsmith/appsmith-ce:v1.98.1
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://appsmith.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "44080:80"
    volumes:
      - appsmith_data:/appsmith-stacks

  # nuke:
  #   image: node:24-alpine
  #   entrypoint: >
  #     sh -c '
  #       sleep 500
  #     '
  #   restart: "no"
  #   volumes:
  #     - appsmith_data:/appsmith-stacks

  appsmith-decree:
    container_name: appsmith-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/.decree/exist.test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - appsmith_data:/volumes/appsmith_data
    tty: false

volumes:
  appsmith_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/appsmith_data"

networks:
  exist:
    external: true
