services:
  actual-budget:
    container_name: actual-budget
    image: actualbudget/actual-server:latest
    restart: unless-stopped
    networks:
      - exist
    ports:
      - '45006:5006'
    volumes:
      - actual_budget_data:/data
    environment:
      - ACTUAL_BUDGET_PASSWORD=${ACTUAL_BUDGET_PASSWORD}
    #   - ACTUAL_BUDGET_HTTPS_KEY=/data/key.key # Uncomment and provide path if using HTTPS
    #   - ACTUAL_BUDGET_HTTPS_CERT=/data/cert.crt # Uncomment and provide path if using HTTPS

  actual-budget-decree:
    container_name: actual-budget-decree
    build:
      context: ../../automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - actual_budget_data:/volumes/actual_budget_data
    tty: false

volumes:
  actual_budget_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/actual_budget_data"

networks:
  exist:
    external: true
