services:
  actual-budget:
    container_name: actual-budget
    image: actualbudget/actual-server:26.6.0
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://actual-budget.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - '45006:5006'
    volumes:
      # SQLite budget files + sync server — tier-2 local (NFS breaks WAL locking).
      - ../../volumes_local/actual_budget_data:/data
    environment:
      - ACTUAL_BUDGET_PASSWORD=${ACTUAL_BUDGET_PASSWORD}
    #   - ACTUAL_BUDGET_HTTPS_KEY=/data/key.key # Uncomment and provide path if using HTTPS
    #   - ACTUAL_BUDGET_HTTPS_CERT=/data/cert.crt # Uncomment and provide path if using HTTPS

  actual-budget-decree:
    container_name: actual-budget-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/.decree/exist.test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      # TODO: live SQLite tar isn't crash-consistent — .backup → volumes/actual_budget_data_backup.
      - ../../volumes_local/actual_budget_data:/volumes/actual_budget_data
    tty: false

networks:
  exist:
    external: true
