services:
  dashy:
    container_name: dashy
    image: "lissy93/dashy:4.2.0"
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    volumes:
      - ./dashy-conf.yml:/app/user-data/conf.yml:Z
    # ports disabled — access via https://dashy.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 44280:8080
    networks:
      - exist
    environment:
      - NODE_ENV=production

networks:
  exist:
    external: true
