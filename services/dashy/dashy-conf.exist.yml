# Dashy dashboard config — `.internal` convention.
#
# Each item has TWO adjacent blocks: the active one points at the live service
# (https://<slug>.internal), the commented one points at the public docs page. Flip
# the comment when a service is decommissioned, paused, or never deployed —
# users still get a landing page explaining what it is and where to find it.
#
# Slugs match the records in hosting/pihole/docker-compose.yml.example and the
# reverse_proxy backends in hosting/caddy/Caddyfile.example. Keep all three in
# sync — run `./existential.sh validate` to verify.
#
# Dashy's native `statusCheck: true` pings the URL on a schedule and overlays
# a red dot when unreachable. That covers runtime health; the comment-flip
# covers "not enabled on either machine."
#
# Icon reference:
#   https://dashy.to/docs/icons/  (hl-*, si-*, fas fa-*)

pageInfo:
  title: Existential
  description: Self-hosted homelab dashboard
  navLinks:
    - title: Docs
      path: https://existential.company/docs

appConfig:
  theme: colorful
  layout: auto
  statusCheckInterval: 60         # ping every 60s
  faviconApi: local

