services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.6.2
    restart: unless-stopped
    networks:
      - exist
    volumes:
      # Recorder SQLite + YAML config — must be local; NFS breaks the recorder DB.
      # TODO: backup sidecar → volumes/homeassistant_config_backup (no sidecar yet).
      - ../../volumes_local/homeassistant_config:/config
    # ports disabled — access via https://homeassistant.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 8123:8123
    environment:
      TZ: ${HOMEASSISTANT_TZ}
    # privileged: true  # uncomment if you need access to host hardware (e.g. USB zigbee/z-wave sticks)

networks:
  exist:
    external: true
