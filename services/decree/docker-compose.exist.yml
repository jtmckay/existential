services:
  decree:
    container_name: decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_AI=${DECREE_AI}
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - NTFY_TOKEN=${EXIST_NTFY_TOKEN}
      - NTFY_URL=${EXIST_NTFY_URL}
      - TELEGRAM_BOT_TOKEN=${EXIST_TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${EXIST_TELEGRAM_CHAT_ID:-}
      - LIGHTRAG_API_KEY=${EXIST_LIGHTRAG_API_KEY:-}
      - DECREE_NOTES_DIR=${DECREE_NOTES_DIR}
      - DROPBOX_DEST_DIR=${DECREE_DROPBOX_DEST_DIR}
      - IN_CONTAINER=1
      # Where the `delegate` routine drops rewritten messages for the secret-free
      # opencode sidecar (decree-delegate) to process. See that service below.
      - DELEGATE_INBOX=/delegate-inbox
      #- GMAIL_INITIAL_SYNC_DAYS=7
      #- GMAIL_LABEL_FILTER=INBOX
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:z
      # decree-delegate's inbox — the `delegate` routine writes here to hand LLM work
      # to the secret-free sidecar. (This daemon holds /secrets; the sidecar does not.)
      - ./delegate/inbox:/delegate-inbox:z
      # Notes data — tier-3. Subdirs created on first use by the scripts.
      #   /data/notes   — Nextcloud sync cache (source of truth: Nextcloud)
      #   /data/dropbox — compiled output for Dropbox (source of truth: /data/notes)
      - ./data:/data:z
      - ../../docker-compose.yml:/work/.decree/docker-compose.yml:ro,z
    tty: false

  decree-webhook:
    container_name: decree-webhook
    # Runs on the shared decree image — it's just an express app. Its deps
    # (express, express-rate-limit, js-yaml) are baked into the image's
    # /opt/decree/node_modules (NODE_PATH), so we mount server.js + config and
    # run node directly (entrypoint override skips the decree-daemon bootstrap).
    image: existential/decree:local
    pull_policy: never
    entrypoint: ["node", "/app/server.js"]
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    depends_on:
      - decree
    networks:
      - exist
    # ports disabled — access via https://decree-webhook.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "${DECREE_WEBHOOK_PORT}:${DECREE_WEBHOOK_PORT}"
    environment:
      - DECREE_WEBHOOK_PORT=${DECREE_WEBHOOK_PORT}
      - DECREE_WEBHOOK_INBOX=/inbox
      - NODE_ENV=production
      #- DECREE_WEBHOOK_MAX_BODY=256kb
      #- DECREE_WEBHOOK_RATE_WINDOW_MS=60000
      #- DECREE_WEBHOOK_RATE_MAX=60
      #- DECREE_WEBHOOK_RATE_FAIL_MAX=10
    volumes:
      - ./decree/inbox:/inbox:z
      - ./webhook/server.js:/app/server.js:ro
      - ./webhook/config.yml:/app/config.yml:ro
    healthcheck:
      # decree image ships curl, not wget
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:${DECREE_WEBHOOK_PORT}/healthz",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

  # ── Secret-free LLM sidecar (SEC-10) ───────────────────────────────────────
  # A second decree daemon that runs opencode for any routine handed to it by the
  # `delegate` routine. It deliberately mounts NO /secrets, so prompt-injection in
  # untrusted content (emails, dropped files, messages) can't exfiltrate credentials.
  # Its opencode model is hermes (opencode.json) — hermes already connects to
  # openviking / firecrawl / playwright as MCP servers and to honcho for memory, so
  # this container gets that full tool support WITHOUT holding any of those keys.
  decree-delegate:
    container_name: decree-delegate
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    depends_on:
      - decree
    networks:
      - exist
    security_opt:
      - no-new-privileges:true  # extra confinement: it runs an agent over untrusted input
    environment:
      - DECREE_AI=opencode
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      # Follow-ups a delegated routine emits via $OUTBOX_DIR are routed to MAIN
      # decree's inbox — so any step that needs a secret (e.g. notify → ntfy token)
      # runs in the secret-holding daemon, never here. Those main routines are
      # deterministic (they parse/route; they do NOT feed attacker text to an LLM),
      # so a delegated message triggering one is a safe, automatable hand-off. A
      # follow-up that is itself `routine: delegate` side-passes back to this sidecar.
      - OUTBOX_DIR=/main-inbox
    volumes:
      - ./delegate:/work/.decree:z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      # Private runs dir (./delegate/runs, inside the ./delegate mount above) —
      # deliberately NOT the shared ../../automations/runs. The secret-free sidecar
      # must not be able to READ other daemons' run logs, which can carry secrets in
      # URLs / error dumps (SEC-10). Ship these logs to Loki/Grafana out-of-band if
      # you want them in the unified audit trail.
      # MAIN decree's inbox — results/follow-ups flow back here (see OUTBOX_DIR above).
      - ./decree/inbox:/main-inbox:z
      # opencode config (model = hermes, which brings the MCP tools + honcho memory).
      - ./delegate/opencode.json:/home/decree/.config/opencode/opencode.json:ro
      # NOTE: there is deliberately NO ../../automations/secrets mount here. That
      # omission is the entire point of this sidecar — do not add it.
    tty: false

networks:
  exist:
    external: true
