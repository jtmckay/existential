services:
  decree:
    container_name: decree
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_AI=${DECREE_AI}
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - NTFY_TOKEN=${EXIST_NTFY_TOKEN}
      - NTFY_URL=${EXIST_NTFY_URL}
      - LIGHTRAG_API_KEY=${EXIST_LIGHTRAG_API_KEY:-}
      - DECREE_NOTES_DIR=${DECREE_NOTES_DIR}
      - DROPBOX_DEST_DIR=${DECREE_DROPBOX_DEST_DIR}
      - IN_CONTAINER=1
      #- GMAIL_INITIAL_SYNC_DAYS=7
      #- GMAIL_LABEL_FILTER=INBOX
    volumes:
      - ../../automations:/work/.decree:z
      - ./secrets:/secrets:z
      - notes_data:/notes_data
      - dropbox_data:/dropbox_data:z
    tty: false

  # Isolated decree daemon — the only container that mounts /repo/.env.
  # Runs both db-backup (logical SQL dumps) and volume-backup (file-level
  # tar) on its own cron schedule. Shares routines/lib/hooks with the main
  # decree daemon but maintains its own config.yml, cron dir, and message
  # state (inbox/outbox/runs/processed.md) under ./decree-backup/.
  #
  # Volume mounts at /volumes/<name> let the volume-backup routine tar each
  # volume directly. Keep that list in sync with the VOLUMES frontmatter in
  # services/decree/decree-backup/cron.example_/volume-backup-*.md.
  decree-backup:
    container_name: decree-backup
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_AI=${DECREE_AI}
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
    volumes:
      # Working dir — writable; inbox/outbox/runs/processed.md land here.
      - ./decree-backup:/work/.decree:z
      # Shared from the main automations tree — read-only.
      - ../../automations/routines:/work/.decree/routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/hooks:/work/.decree/hooks:ro,z
      # Shared runs/ — execution logs land alongside the main daemon's so
      # clean-runs and any log tooling pick them up uniformly.
      - ../../automations/runs:/work/.decree/runs:z
      # Backup-specific config and cron — read-only override.
      - ./decree-backup/config.yml:/work/.decree/config.yml:ro,z
      - ./decree-backup/cron:/work/.decree/cron:ro,z
      # Master .env — sole source of DB credentials. ONLY mounted here.
      - ../../.env:/repo/.env:ro,Z
      - ./secrets:/secrets:ro,z
      # ── Volumes (writable so volume-restore can wipe+extract) ─────────
      # Keep this list in sync with VOLUMES in cron.example_/volume-backup-*.md
      - actual_budget_data:/volumes/actual_budget_data
      - appsmith_data:/volumes/appsmith_data
      - hermes_agent_data:/volumes/hermes_agent_data
      - lightrag_rag_storage_data:/volumes/lightrag_rag_storage_data
      - lowcoder_data:/volumes/lowcoder_data
      - lowcoder_assets:/volumes/lowcoder_assets
      - mealie_data:/volumes/mealie_data
      - nocodb_data:/volumes/nocodb_data
      - open_webui_data:/volumes/open_webui_data
      - vikunja_data:/volumes/vikunja_data
      - grafana_data:/volumes/grafana_data
      - portainer_data:/volumes/portainer_data
      - uptime_kuma_data:/volumes/uptime_kuma_data
    tty: false

  decree-base:
    image: ghcr.io/jtmckay/decree:latest
    entrypoint: ["true"]
    restart: "no"

  decree-webhook:
    container_name: decree-webhook
    build:
      context: ./webhook
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - decree
    networks:
      - exist
    ports:
      - "${DECREE_WEBHOOK_PORT}:${DECREE_WEBHOOK_PORT}"
    environment:
      - DECREE_WEBHOOK_PORT=${DECREE_WEBHOOK_PORT}
      - DECREE_WEBHOOK_INBOX=/inbox
      - NODE_ENV=production
      #- DECREE_WEBHOOK_MAX_BODY=256kb
      #- DECREE_WEBHOOK_RATE_WINDOW_MS=60000
      #- DECREE_WEBHOOK_RATE_MAX=60
      #- DECREE_WEBHOOK_RATE_FAIL_MAX=10
    volumes:
      - ../../automations/inbox:/inbox:z
      - ./webhook/config.yml:/app/config.yml:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:${DECREE_WEBHOOK_PORT}/healthz",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  notes_data:
  dropbox_data:
  # Same volume names as the per-service composes — Docker resolves them to
  # the same underlying volumes. If a consumer service has never started,
  # Docker creates an empty volume here, which is fine (produces a near-empty
  # tar) and lets us restore-before-enable.
  actual_budget_data:
  appsmith_data:
  hermes_agent_data:
  lightrag_rag_storage_data:
  lowcoder_data:
  lowcoder_assets:
  mealie_data:
  nocodb_data:
  open_webui_data:
  vikunja_data:
  grafana_data:
  portainer_data:
  uptime_kuma_data:

networks:
  exist:
    external: true
