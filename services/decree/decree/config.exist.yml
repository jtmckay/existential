routine_source: /work/.decree/shared_routines
commands:
  ai_router: opencode run {prompt}
  ai_interactive: opencode
max_attempts: 3
max_depth: 100
max_log_size: 2097152
default_routine: develop
hooks:
  beforeAll: ""
  afterAll: ""
  beforeEach: /work/.decree/lib/hooks/config-watch.sh
  afterEach: /work/.decree/lib/hooks/afterEach.sh
shared_routines:
  actual-budget:
    enabled: false
  actual-budget-parse:
    enabled: false
  check-disabled-runs:
    enabled: true
  clean-runs:
    enabled: true
  # Hands LLM work to the secret-free decree-delegate sidecar (SEC-10). Runs in this
  # (secret-holding) daemon; the actual AI step runs secret-free in the sidecar.
  delegate:
    enabled: true
  develop:
    enabled: false
  file-processor:
    enabled: false
  minio-router:
    enabled: false
  gmail:
    enabled: false
  gmail-sync:
    enabled: false
  notes:
    enabled: false
  notify:
    enabled: true
  ollama-pull:
    enabled: false
  check-versions:
    enabled: true
  service-health:
    enabled: true
