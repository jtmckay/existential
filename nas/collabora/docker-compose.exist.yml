services:
  # UI interface at http://localhost:9980/
  collabora:
    container_name: collabora
    image: collabora/code:25.04.10.3.1
    restart: unless-stopped
    networks:
      - exist
    environment:
      - username=${COLLABORA_USERNAME}
      - password=${COLLABORA_PASSWORD} 
      - domain=${COLLABORA_NEXTCLOUD_DOMAIN} # nextcloud.internal
      - server_name=${COLLABORA_DOMAIN} # collabora.internal
      - dictionaries=en
      # - extra_params=--o:ssl.enable=true
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
    # ports disabled — access via https://collabora.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 9980:9980

networks:
  exist:
    external: true
