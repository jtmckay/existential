services:
  # Object storage for Nextcloud
  # UI interface at http://localhost:49001
  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://minio.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "49000:9000"
    #     - "49001:9001"
    volumes:
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/minio_data:/data # Path to the mounted NFS share on the Proxmox host
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_DOMAIN=${MINIO_DOMAIN}
      - MINIO_SERVER_URL=${MINIO_SERVER_URL}
      - MINIO_NOTIFY_WEBHOOK_ENABLE_DECREE=on
      - MINIO_NOTIFY_WEBHOOK_ENDPOINT_DECREE=http://decree-webhook:48880/minio
      - MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_DECREE=${MINIO_DECREE_WEBHOOK_AUTH_TOKEN}
    command: server /data --console-address :9001

networks:
  exist:
    external: true
