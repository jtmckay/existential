services:
  # File share
  # UI interface at http://localhost:8421/
  nextcloud:
    container_name: nextcloud
    image: nextcloud:latest
    restart: unless-stopped
    networks:
      - exist
    ports:
      - "48421:80"
    volumes:
      - nextcloud_data:/var/www/html
      - ./servername.conf:/etc/apache2/conf-enabled/servername.conf:ro,Z
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_DOMAIN} # Unfortunately most of these values are only used on the first run.
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES} # To update values, you will need to manually change config/config.php.
      - OVERWRITEHOST=${NEXTCLOUD_DOMAIN} # Or nuke your Nextcloud volumes and start over.
      - OVERWRITECLIURL=${NEXTCLOUD_PROTOCOL}://${NEXTCLOUD_DOMAIN}
      - OVERWRITEPROTOCOL=${NEXTCLOUD_PROTOCOL}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_SQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=nextcloud-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_HOST_PASSWORD=${NEXTCLOUD_REDIS_PASSWORD}

  # Database for Nextcloud
  nextcloud-db:
    container_name: nextcloud-db
    image: mariadb:10.6
    restart: unless-stopped
    networks:
      - exist
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - nextcloud_sql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_SQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  nextcloud-decree:
    container_name: nextcloud-decree
    build:
      context: ../../automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - NEXTCLOUD_ROOT_PASSWORD=${NEXTCLOUD_ROOT_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
    tty: false

volumes:
  nextcloud_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/nextcloud_data"
  # MariaDB on local disk — NFS has unsafe fsync/lock semantics for DBs.
  # Backed up via automations/shared_routines/db-backup.sh → rclone remote.
  nextcloud_sql_data:

networks:
  exist:
    external: true
