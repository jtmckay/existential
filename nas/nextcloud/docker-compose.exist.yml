services:
  # File share
  # UI interface at http://localhost:8421/
  nextcloud:
    container_name: nextcloud
    image: nextcloud:34.0.0-apache
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://nextcloud.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "48421:80"
    volumes:
      # Split webroot: the PHP code stays in the image's writable layer (fast — not
      # NFS); only the persisted subdirs are bind-mounted. Mounting all of
      # /var/www/html over NFS makes every request stat thousands of small files.
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/nextcloud_data:/var/www/html/data
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/nextcloud_config:/var/www/html/config
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/nextcloud_custom_apps:/var/www/html/custom_apps
      - ${EXIST_NFS_HOST_MOUNT:-./volumes}/nextcloud_themes:/var/www/html/themes
      - ./servername.conf:/etc/apache2/conf-enabled/servername.conf:ro,Z
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_DOMAIN} # Unfortunately most of these values are only used on the first run.
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES} # To update values, you will need to manually change config/config.php.
      - OVERWRITEHOST=${NEXTCLOUD_DOMAIN} # Or nuke your Nextcloud volumes and start over.
      - OVERWRITECLIURL=${NEXTCLOUD_PROTOCOL}://${NEXTCLOUD_DOMAIN}
      - OVERWRITEPROTOCOL=${NEXTCLOUD_PROTOCOL}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_SQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=nextcloud-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_HOST_PASSWORD=${NEXTCLOUD_REDIS_PASSWORD}

  # Database for Nextcloud
  nextcloud-db:
    container_name: nextcloud-db
    image: mariadb:11.4
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      # MariaDB — tier-2 local. TODO: mysqldump → volumes/nextcloud_sql_data_backup.
      - ../../volumes_local/nextcloud_sql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_SQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      # - MARIADB_AUTO_UPGRADE=1

  nextcloud-decree:
    container_name: nextcloud-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
      - NEXTCLOUD_ROOT_PASSWORD=${NEXTCLOUD_ROOT_PASSWORD}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/.decree/exist.test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
    tty: false

networks:
  exist:
    external: true
