services:
  # Local VLM backend: MiniCPM-V served via vLLM (OpenAI-compatible API)
  minicpm-v-llm:
    container_name: minicpm-v-llm
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    networks:
      - exist
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VLLM_MODEL=${VLLM_MODEL} # or another MiniCPM-V variant that fits 6GB
      - VLLM_GPU_MEMORY_UTILIZATION=0.9
      - VLLM_MAX_MODEL_LEN=4096
      - VLLM_DTYPE=auto
    # Optionally mount HF cache if you want:
    # volumes:
    #   - minicpm_hf_cache:/root/.cache/huggingface

  # Vision MCP server: wraps the VLM via OpenAI-compatible API
  vision-mcp:
    container_name: vision-mcp
    image: groundlight/mcp-vision:latest
    restart: unless-stopped
    networks:
      - exist
    ports:
      - ${VISION_MCP_PORT:-49030}:3000
    depends_on:
      - minicpm-v-llm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      # Tell mcp-vision to talk to the local vLLM server
      - HF_BASE_URL=http://minicpm-v-llm:8000
      - HF_MODEL_ID=${VLLM_MODEL}
      - PORT=3000
      - LOG_LEVEL=info

volumes:
  minicpm_hf_cache:

networks:
  exist:
    external: true
