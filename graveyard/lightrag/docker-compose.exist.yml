services:
  lightrag:
    container_name: lightrag
    image: ghcr.io/hkuds/lightrag:v1.5.2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - exist
    # ports disabled — access via https://lightrag.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "49621:9621"
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    env_file:
      - ./.env
    volumes:
      # LightRAG reads config from /app/.env on disk (env_file: alone is not enough —
      # without this mount, LOG_FILE and other settings are ignored and it crashes on
      # PermissionError writing to /app/lightrag.log as a non-root user).
      - ./.env:/app/.env:ro
      # Read-only mount of the Obsidian notes. rclone syncs here via lightrag-decree.
      - ${LIGHTRAG_NOTES_PATH}:/inputs:ro
      # Writable derived store — graph, vectors, KV. Many small files + locking, so
      # tier-2 local (never NFS). Reproducible from the vault, but kept + backed up to
      # avoid re-embedding. Wipe before changing the embedding model.
      - ../../volumes_local/lightrag_rag_storage_data:/app/rag_storage

  lightrag-decree:
    container_name: lightrag-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/exist.test.sh:ro,z
      - ../../src/test/exist-test.sh:/src/test/exist-test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      # TODO: live-store tar isn't crash-consistent — snapshot → volumes/lightrag_rag_storage_data_backup.
      - ../../volumes_local/lightrag_rag_storage_data:/volumes/lightrag_rag_storage_data
      - ${LIGHTRAG_NOTES_PATH}:/notes
    tty: false

networks:
  exist:
    external: true
