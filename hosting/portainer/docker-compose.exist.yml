services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.42.0
    # Root + docker.sock: portainer manages the Docker daemon. The image is
    # distroless (no shell), so the admin password can't be written at startup —
    # templates.sh renders portainer_password.txt; we mount it read-only and point
    # --admin-password-file at it (default /portainer entrypoint, no shell needed).
    # ports disabled — access via https://portainer.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 49443:9443
    volumes:
      # Docker (default). For rootless Podman instead, swap for:
      #   - /run/user/${EXIST_PUID:-1000}/podman/podman.sock:/var/run/docker.sock:z
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_password.txt:/run/portainer/admin_password:ro
      # bbolt (portainer.db) — must be local; NFS breaks flock/mmap.
      # TODO: backup sidecar → volumes/portainer_data_backup (no sidecar yet).
      - ../../volumes_local/portainer_data:/data
    security_opt:
      - label=disable
    networks:
      - exist
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock --admin-password-file /run/portainer/admin_password

networks:
  exist:
    external: true
