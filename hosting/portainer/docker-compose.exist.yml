services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.42.0
    # ports disabled — access via https://portainer.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 49443:9443
    environment:
      - PORTAINER_ADMIN_PASSWORD=${PORTAINER_ADMIN_PASSWORD}
    volumes:
      # For Docker
      # - /var/run/docker.sock:/var/run/docker.sock
      # For Podman
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:z
      - portainer_data:/data
    security_opt:
      - label=disable
    networks:
      - exist
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: >
      printf '%s' "$$PORTAINER_ADMIN_PASSWORD" > /tmp/pw.txt &&
      exec /portainer -H unix:///var/run/docker.sock --admin-password-file /tmp/pw.txt


volumes:
  portainer_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/portainer_data"

networks:
  exist:
    external: true