services:
  # Grafana dashboards at http://localhost:43010
  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    # grafana runs as uid 472 internally; run as the host user instead so it can
    # write the host-owned bind-mounted grafana_data (tier-2 local, never NFS).
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    networks:
      - exist
    # ports disabled — access via https://grafana.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 43010:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false

      # Authelia OIDC. Disable with GRAFANA_OAUTH_ENABLED=false (.env.exist); local
      # admin login stays as a fallback. TLS_CLIENT_CA verifies authelia's cert via the
      # internal CA mounted below (scoped to this connection, not Grafana's global trust).
      - GF_AUTH_GENERIC_OAUTH_ENABLED=${GRAFANA_OAUTH_ENABLED}
      - GF_AUTH_GENERIC_OAUTH_NAME=${GRAFANA_OAUTH_NAME}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OAUTH_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=${GRAFANA_OAUTH_SCOPES}
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${GRAFANA_OAUTH_AUTH_URL}
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${GRAFANA_OAUTH_TOKEN_URL}
      - GF_AUTH_GENERIC_OAUTH_API_URL=${GRAFANA_OAUTH_API_URL}
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=${GRAFANA_OAUTH_ROLE_ATTRIBUTE_PATH}
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=${GRAFANA_OAUTH_USE_PKCE}
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=${GRAFANA_OAUTH_ALLOW_SIGN_UP}
      - GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA=/etc/grafana/internal-ca.pem
    volumes:
      # SQLite (grafana.db) — must be local; NFS breaks WAL locking.
      # TODO: backup sidecar → volumes/grafana_data_backup (no sidecar yet).
      - ../../volumes_local/grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
      # Internal CA (minted by caddy/exist.initial.sh) — verifies authelia's OIDC TLS.
      - ../../hosting/caddy/certs/internal-ca.pem:/etc/grafana/internal-ca.pem:ro

networks:
  exist:
    external: true
