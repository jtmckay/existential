services:
  # Grafana dashboards at http://localhost:43010
  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    # grafana runs as uid 472 internally; run as the host user instead so it can
    # write the bind-mounted grafana_data (host-owned) when NFS isn't configured.
    user: "1000:1000"
    networks:
      - exist
    # ports disabled — access via https://grafana.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 43010:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro


volumes:
  grafana_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/grafana_data"

networks:
  exist:
    external: true
