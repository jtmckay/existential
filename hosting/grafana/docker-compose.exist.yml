services:
  # Grafana dashboards at http://localhost:43010
  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    # grafana runs as uid 472 internally; run as the host user instead so it can
    # write the host-owned bind-mounted grafana_data (tier-2 local, never NFS).
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    networks:
      - exist
    # ports disabled — access via https://grafana.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 43010:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # SQLite (grafana.db) — must be local; NFS breaks WAL locking.
      # TODO: backup sidecar → volumes/grafana_data_backup (no sidecar yet).
      - ../../volumes_local/grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro

networks:
  exist:
    external: true
