# More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
#
# You will need to uncomment and disable the stub DNS
# /etc/systemd/resolved.conf
# DNSStubListener=no
#
# ── DNS convention ────────────────────────────────────────────────────────────
# piHole resolves the ENTIRE base domain (EXIST_DOMAIN, default x.internal) and
# every subdomain to EXIST_LOCAL_HOST_IP with a single wildcard record below —
# there are no per-slug A-records. Adding a service never touches this file; the
# slug just needs a reverse_proxy block in hosting/caddy/Caddyfile, which is the
# single source of truth for what `<slug>.<domain>` actually exists.
#
# The wildcard always points at the host running Caddy (EXIST_LOCAL_HOST_IP). In
# peer mode that front-door Caddy forwards onward to EXIST_PEER_HOST_IP — see
# hosting/caddy/Caddyfile.frontdoor-lan.example (or -public.example).

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2026.05.0
    restart: unless-stopped
    networks:
      - exist
    ports:
      # DNS ports — must stay exposed (cannot route through Caddy)
      - "53:53/tcp"
      - "53:53/udp"
      # Web UI — access via https://pihole.<domain> (Caddy + pihole required)
      # Uncomment to expose directly:
      #   - "42480:80/tcp"
      #   - "42443:443/tcp"
      # Uncomment the line below if you are using Pi-hole as your DHCP server
      #- "67:67/udp"
      # Uncomment the line below if you are using Pi-hole as your NTP server
      #- "123:123/udp"
    environment:
      # Set the appropriate timezone for your location (https://en.wikipedia.org/wiki/List_of_tz_database_time_zones), e.g:
      TZ: 'America/Denver'
      # Set a password to access the web interface. Not setting one will result in a random password being assigned
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      # If using Docker's default `bridge` network setting the dns listening mode should be set to 'ALL'
      FTLCONF_dns_listeningMode: 'ALL'
      # Wildcard DNS masks: each `address=/<domain>/<ip>` line resolves that domain
      # AND every `<slug>.<domain>` subdomain to one host — see the "DNS convention"
      # header above. The first line is this stack; add more lines to point another
      # domain (e.g. a second stack on the LAN, or a real domain) at a different host.
      # A leading `#` is a dnsmasq comment, so commented lines are safely ignored.
      FTLCONF_misc_dnsmasq_lines: |
        address=/${EXIST_DOMAIN}/${EXIST_LOCAL_HOST_IP}
        # address=/y.internal/192.168.1.60
      # Per-host OVERRIDES (optional). dns_hosts are exact `<ip> <fqdn>` records, the
      # same format the old per-slug list used. dnsmasq resolves the MOST SPECIFIC
      # match, so an exact record here WINS over the wildcard above for that one name
      # (verified: a `2.2.2.2 special.<domain>` record beats `address=/<domain>/...`).
      # The wildcard still covers every other subdomain — you only list exceptions.
      # We don't use dns_hosts for everything because it has NO wildcard: it'd be one
      # line per slug (exactly the per-slug maintenance the wildcard removes).
      # Leave commented unless a specific subdomain must point somewhere else:
      # FTLCONF_dns_hosts: |
      #   ${EXIST_PEER_HOST_IP} immich.${EXIST_DOMAIN}      # this one service lives on the peer host
      #   192.168.1.99 grafana.${EXIST_DOMAIN}              # pin grafana at a fixed box
    volumes:
      # For persisting Pi-hole's databases and common configuration file
      - './etc-pihole:/etc/pihole:Z'
      # Uncomment the below if you have custom dnsmasq config files that you want to persist. Not needed for most starting fresh with Pi-hole v6. If you're upgrading from v5 you and have used this directory before, you should keep it enabled for the first v6 container start to allow for a complete migration. It can be removed afterwards. Needs environment variable FTLCONF_misc_etc_dnsmasq_d: 'true'
      #- './etc-dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      # See https://docs.pi-hole.net/docker/#note-on-capabilities
      # Required if you are using Pi-hole as your DHCP server, else not needed
      - NET_ADMIN
      # Required if you are using Pi-hole as your NTP client to be able to set the host's system time
      - SYS_TIME
      # Optional, if Pi-hole should get some more processing time
      - SYS_NICE

networks:
  exist:
    external: true
