services:
  loki:
    container_name: loki
    image: grafana/loki:3.2.0
    restart: unless-stopped
    # loki runs as uid 10001 internally; run as the host user instead so it can
    # write the host-owned bind-mounted loki_data (tier-2 local, never NFS).
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    networks:
      - exist
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      # boltdb-shipper index + chunks — must be local; NFS locking is unreliable.
      # TODO: opt-in backup sidecar → volumes/loki_data_backup.
      - ../../volumes_local/loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  loki-promtail:
    container_name: loki-promtail
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    networks:
      - exist
    volumes:
      - ./loki-promtail-config.yaml:/etc/promtail/config.yml:ro
      - ../../automations/runs:/runs:ro
      # promtail scrapes the on-disk json logs directly (static_configs in
      # loki-promtail-config.yaml) — there is no docker_sd_configs, so the
      # daemon socket is not needed. Mounting /var/run/docker.sock would grant
      # promtail full Docker API access (= host root), so it is deliberately
      # omitted.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

networks:
  exist:
    external: true
