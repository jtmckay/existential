services:
  loki:
    container_name: loki
    image: grafana/loki:3.2.0
    restart: unless-stopped
    networks:
      - exist
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  loki-promtail:
    container_name: loki-promtail
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    networks:
      - exist
    volumes:
      - ./loki-promtail-config.yaml:/etc/promtail/config.yml:ro
      - ../../automations/runs:/runs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  loki_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_TRUENAS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_TRUENAS_CONTAINER_PATH}/loki_data"

networks:
  exist:
    external: true
