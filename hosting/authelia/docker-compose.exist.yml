services:
  # Authelia — SSO / forward-auth gateway. Caddy bounces protected vhosts
  # (those that `import authelia_protect`) to https://authelia.<domain> and only
  # forwards once authenticated. See hosting/caddy/Caddyfile.exist.Caddyfile.
  #
  # Phase 1: file-based users (users_database.yml, generated by exist.initial.sh),
  # in-memory sessions (no redis dependency — sessions are lost on an Authelia
  # restart, which only forces re-login). Phase 2 (see AUTHELIA_PLAN.md): redis
  # session persistence + OIDC provider for mealie/vikunja/open-webui/grafana/etc.
  authelia:
    container_name: authelia
    image: authelia/authelia:4.39.5  # verify latest patch: ./existential.sh run check-versions
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://authelia.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 49091:9091
    environment:
      # Secrets come from the rendered service .env (aggregated into the root .env).
      # Names match Authelia's native env overrides, so they map 1:1.
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./configuration.yml:/config/configuration.yml:ro,Z
      # Generated by exist.initial.sh (argon2id hash of EXIST_PASSWORD). Gitignored.
      - ./users_database.yml:/config/users_database.yml:ro,Z
      # SQLite (2FA device registrations, user prefs) + filesystem notifier output.
      # tier-2 local — embedded DB, never NFS. # TODO: backup sidecar.
      - ../../volumes_local/authelia_data:/data:Z

networks:
  exist:
    external: true
