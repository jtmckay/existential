# Authelia configuration — rendered from configuration.exist.yml (bare EXIST_DOMAIN
# tokens are substituted at render time). Secrets are NOT here — they come from the
# AUTHELIA_* env vars in docker-compose.exist.yml / .env.exist.
#
# Schema: Authelia 4.38+ (session.cookies list, access_control, identity_validation).

theme: dark

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info

totp:
  issuer: EXIST_DOMAIN

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2

# Default-deny. Only requests forwarded by Caddy's `import authelia_protect` reach
# Authelia, so unprotected vhosts are unaffected by these rules. code-server and
# portainer require 2FA (RCE / host-root surfaces); everything else is one-factor.
access_control:
  default_policy: deny
  rules:
    - domain:
        - 'code-server.EXIST_DOMAIN'
        - 'portainer.EXIST_DOMAIN'
      policy: two_factor
    - domain: '*.EXIST_DOMAIN'
      policy: one_factor

session:
  name: authelia_session
  # In-memory sessions (no redis) — lost on Authelia restart (re-login only).
  # Phase 2: add a `redis:` block for persistence (see AUTHELIA_PLAN.md).
  cookies:
    - domain: EXIST_DOMAIN
      authelia_url: 'https://authelia.EXIST_DOMAIN'
      default_redirection_url: 'https://dashy.EXIST_DOMAIN'

regulation:
  max_retries: 4
  find_time: '2m'
  ban_time: '5m'

storage:
  local:
    path: /data/db.sqlite3

# Filesystem notifier — 2FA registration / password-reset messages are written to
# this file (no SMTP dependency). Read it with: docker exec authelia cat /data/notification.txt
# Phase 2: switch to an `smtp:` notifier for real email delivery.
notifier:
  filesystem:
    filename: /data/notification.txt

# ---------------------------------------------------------------------------
# Phase 2: OIDC Provider
# ---------------------------------------------------------------------------
# Authelia acts as an OpenID Connect provider for grafana, mealie, vikunja,
# and open-webui. These apps DO NOT get `import authelia_protect` in Caddy —
# they handle auth via OIDC redirect and keep their own local-login fallback.
#
# The JWKS RSA key is generated by exist.initial.sh into hosting/authelia/oidc/oidc.key
# (gitignored) and mounted read-only. The template filter (X_AUTHELIA_CONFIG_FILTERS=template)
# is enabled in docker-compose.exist.yml to allow the {{ secret }} function below.
#
# Client secrets use the $plaintext$ form (Authelia logs a warning — acceptable for
# a homelab where the rendered configuration.yml is gitignored). The rendered value
# is the same secret already stored in the root .env; hardened hashing is a future TODO.
identity_providers:
  oidc:
    # HMAC secret passed via AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET env var.
    # The env var takes precedence over any value here, so this is a reminder only.

    # JWKS: RSA-2048 private key for signing ID tokens (RS256).
    # The template filter embeds the file contents at startup.
    jwks:
      - key_id: 'rsa2048'
        algorithm: 'RS256'
        use: 'sig'
        key: {{ secret "/config/oidc/oidc.key" | mindent 10 "|" | msquote }}

    clients:
      # ---- Grafana ----
      - client_id: 'grafana'
        client_name: 'Grafana'
        # Plaintext form — rendered configuration.yml is gitignored; see §1b of AUTHELIA_PHASE2.md.
        # TODO (hardening): replace with a pbkdf2 hash generated in exist.initial.sh.
        client_secret: '$plaintext$EXIST_OIDC_GRAFANA_CLIENT_SECRET'
        public: false
        authorization_policy: 'one_factor'
        redirect_uris:
          - 'https://grafana.EXIST_DOMAIN/login/generic_oauth'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'

      # ---- Mealie ----
      - client_id: 'mealie'
        client_name: 'Mealie'
        client_secret: '$plaintext$EXIST_OIDC_MEALIE_CLIENT_SECRET'
        public: false
        authorization_policy: 'one_factor'
        redirect_uris:
          - 'https://mealie.EXIST_DOMAIN/login'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'

      # ---- Vikunja ----
      # redirect_uri path segment ('authelia') must match the provider key used in
      # VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_* env vars (lowercased in the URI).
      - client_id: 'vikunja'
        client_name: 'Vikunja'
        client_secret: '$plaintext$EXIST_OIDC_VIKUNJA_CLIENT_SECRET'
        public: false
        authorization_policy: 'one_factor'
        redirect_uris:
          - 'https://vikunja.EXIST_DOMAIN/auth/openid/authelia'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'

      # ---- Open WebUI ----
      - client_id: 'open-webui'
        client_name: 'Open WebUI'
        client_secret: '$plaintext$EXIST_OIDC_OPEN_WEBUI_CLIENT_SECRET'
        public: false
        authorization_policy: 'one_factor'
        redirect_uris:
          - 'https://open-webui.EXIST_DOMAIN/oauth/oidc/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'
