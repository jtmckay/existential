services:
  # UI interface at http://localhost:30565
  uptime-kuma:
    container_name: uptime-kuma
    image: "louislam/uptime-kuma:1"
    restart: unless-stopped
    networks:
      - exist
    ports:
      - 43001:3001
    environment:
      - ADMIN_USERNAME=${UPTIME_KUMA_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${UPTIME_KUMA_ADMIN_PASSWORD}
    volumes:
      - uptime_kuma_data:/app/data

  uptime-kuma-decree:
    container_name: uptime-kuma-decree
    build:
      context: ../../automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
    tty: false

volumes:
  uptime_kuma_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/uptime_kuma_data"

networks:
  exist:
    external: true
