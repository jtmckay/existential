services:
  # UI interface at http://localhost:30565
  uptime-kuma:
    container_name: uptime-kuma
    image: "louislam/uptime-kuma:2.4.0"
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://uptime-kuma.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 43001:3001
    environment:
      - ADMIN_USERNAME=${UPTIME_KUMA_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${UPTIME_KUMA_ADMIN_PASSWORD}
    volumes:
      # SQLite — must be local; NFS breaks WAL locking.
      # TODO: backup sidecar → volumes/uptime_kuma_data_backup (no sidecar yet).
      - ../../volumes_local/uptime_kuma_data:/app/data

networks:
  exist:
    external: true
