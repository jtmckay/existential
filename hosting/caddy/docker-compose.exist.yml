services:
  caddy:
    container_name: caddy
    image: caddy:2.11.4
    restart: unless-stopped
    networks:
      - exist
        # ipv4_address: 10.0.0.5 # Verify by running `docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' caddy`
    # Least privilege: Caddy only needs to bind 80/443, not full host privilege.
    cap_add:
      - NET_BIND_SERVICE
    ports:
      # :443 is HTTPS; :80 redirects http→https (and serves the Let's Encrypt
      # challenge when EXIST_PUBLIC_DOMAIN is set). Keep both.
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ./error.html:/var/www/html/error.html:ro,Z
      # Internal CA root + ACME state — tier-2 local, worth keeping.
      # TODO: backup sidecar → volumes/caddy_data_backup (no sidecar yet).
      - ../../volumes_local/caddy_data:/data
      # Autosaved JSON config (regenerated from the Caddyfile) — tier-3 throwaway.
      - ./caddy_config:/config
      # TLS certs: the stable *.<domain> pair minted by exist.initial.sh and any
      # user-supplied cloudflare origin pair. Only *.exist.pem templates are tracked.
      - ./certs/:/etc/caddy/certs/:ro,Z
    environment:
      - CADDY_INGRESS_NETWORKS=exist
      # CADDY_DOMAIN (from this service's .env.exist, defaults to EXIST_DOMAIN) is
      # read by the Caddyfile as {$CADDY_DOMAIN}. PEER/PUBLIC are only used by the
      # front-door swap-in Caddyfiles. Values come from the generated master .env.
      - CADDY_DOMAIN=${CADDY_DOMAIN}
      - EXIST_PEER_HOST_IP=${EXIST_PEER_HOST_IP}
      - EXIST_PUBLIC_DOMAIN=${EXIST_PUBLIC_DOMAIN}

networks:
  exist:
    external: true
