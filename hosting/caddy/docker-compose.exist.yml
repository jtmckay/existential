services:
  caddy:
    container_name: caddy
    image: caddy:2.11.4
    restart: unless-stopped
    networks:
      exist:
        # ipv4_address: 10.0.0.5 # Verify by running `docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' caddy`
    # Least privilege: Caddy only needs to bind 80/443, not full host privilege.
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80" # Standard HTTP port for local development
      - "443:443" # Standard HTTPS port for local development
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ./error.html:/var/www/html/error.html:ro,Z
      - caddy_data:/data
      - caddy_config:/config
      - ../cloudflare/:/etc/caddy/certs/:ro,Z
    environment:
      - CADDY_INGRESS_NETWORKS=exist
      # Only used by Caddyfile.peer-example (Caddy on a different host than the
      # services). Caddy expands {$EXIST_PEER_HOST_IP} from this container env;
      # the value comes from .env.shared via the generated master .env. Empty
      # unless set — harmless for the default co-located Caddyfile.
      - EXIST_PEER_HOST_IP=${EXIST_PEER_HOST_IP}

volumes:
  caddy_data:
  caddy_config:

networks:
  exist:
    external: true
