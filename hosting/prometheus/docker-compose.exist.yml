services:
  # Prometheus metrics UI at http://localhost:49090
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    # prometheus runs as uid 65534 (nobody) internally; run as the host user
    # instead so it can write the host-owned bind-mounted prometheus_data
    # (tier-2 local, never NFS).
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    networks:
      - exist
    # ports disabled — access via https://prometheus.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 49090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      # TSDB — must be local; mmap + POSIX locks are unsupported on NFS (corruption).
      # TODO: opt-in backup sidecar → volumes/prometheus_data_backup (snapshot API).
      - ../../volumes_local/prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'

  prometheus-pushgateway:
    container_name: prometheus-pushgateway
    image: prom/pushgateway:v1.10.0
    restart: unless-stopped
    networks:
      - exist

  prometheus-node-exporter:
    container_name: prometheus-node-exporter
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    networks:
      - exist
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

networks:
  exist:
    external: true
