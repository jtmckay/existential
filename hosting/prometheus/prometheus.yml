global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['prometheus-pushgateway:9091']

  - job_name: node
    static_configs:
      - targets: ['prometheus-node-exporter:9100']

  - job_name: caddy
    static_configs:
      - targets: ['caddy:2019']
