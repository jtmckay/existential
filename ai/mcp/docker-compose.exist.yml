services:
  mcp-playwright:
    container_name: mcp-playwright
    image: node:22-bullseye
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - exist
    working_dir: /app
    command: ["npx", "@playwright/mcp@latest", "--port", "8931", "--headless"]
    # ports disabled — access via https://mcp-playwright.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "8931:8931"
    environment:
      # optional: tweak browser config via env if you want
      PLAYWRIGHT_MCP_PORT: "8931"
      PLAYWRIGHT_MCP_HOST: "0.0.0.0"
      PLAYWRIGHT_MCP_ALLOWED_HOSTS: "*"
    volumes:
      - ./playwright-data:/root/.cache/ms-playwright:Z

# docker compose exec hermes-agent /opt/hermes/.venv/bin/hermes mcp add playwright --url http://mcp-playwright:8931/sse

networks:
  exist:
    external: true
