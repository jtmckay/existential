services:
  # Node-based image generation UI (Stable Diffusion / SDXL)
  # Web UI at http://comfyui:8188 / https://comfyui.<domain>
  comfyui:
    container_name: comfyui
    # Pinned (was :latest-cuda) for reproducibility. Bump via ./existential.sh run check-versions.
    image: ghcr.io/ai-dock/comfyui:v2-cuda-12.1.1-base-22.04-v0.2.7

    # NVIDIA GPU
    deploy:
      resources:
        limits:
          memory: 16G   # Adjust for your VRAM + CPU RAM needs
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video,display
      - DIRECT_ADDRESS=0.0.0.0
      - DIRECT_ADDRESS_GET_WAN=false
      - WEB_ENABLE_AUTH=false
      - CF_TUNNEL_TOKEN=
      - AUTO_UPDATE=false
      - COMFYUI_ARGS=${COMFYUI_ARGS:---listen 0.0.0.0}

    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://comfyui.<domain> (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 8188:8188

    volumes:
      # GPU workspace: models + custom nodes + outputs. Re-downloadable — tier-3, not backed up.
      - ./comfyui_data:/workspace

networks:
  exist:
    external: true
