  whisper: # CPU version
    container_name: whisper
    image: fedirz/faster-whisper-server:0.9.0-rc.3-cpu
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - exist
    # ports disabled — access via https://whisper.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 48000:8000
    volumes:
      - ./whisper_data:/root/.cache/huggingface:Z

networks:
  exist:
    external: true
