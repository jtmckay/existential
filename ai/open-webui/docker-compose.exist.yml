services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    networks:
      - exist
    ports:
      - "11488:8080"
    environment:
      UID: "1000"
      GID: "1000"
      WEBUI_ADMIN_NAME: ${OPEN_WEBUI_ADMIN_NAME}
      WEBUI_ADMIN_EMAIL: ${OPEN_WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${OPEN_WEBUI_ADMIN_PASSWORD}
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY}
      # Connect to hermes-agent's OpenAI-compatible gateway over the exist
      # Docker network — Caddy's only there for browser-facing .internal traffic.
      OPENAI_API_BASE_URL: http://hermes-agent:8642/v1
      OPENAI_API_KEY: ${OPEN_WEBUI_HERMES_API_KEY:-}
      # Disable direct Ollama integration — hermes-agent is the backend
      ENABLE_OLLAMA_API: "false"
      # Point STT at the existing whisper service instead of running a second instance
      AUDIO_STT_ENGINE: openai
      AUDIO_STT_OPENAI_API_BASE_URL: http://whisper:8000/v1
      AUDIO_STT_OPENAI_API_KEY: "none"
    volumes:
      - open_webui_data:/app/backend/data

  open-webui-decree:
    container_name: open-webui-decree
    build:
      context: ../../automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - EXIST_BACKUP_RCLONE_REMOTE=${EXIST_BACKUP_RCLONE_REMOTE}
    volumes:
      - ./decree:/work/.decree:z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
      - open_webui_data:/volumes/open_webui_data
    tty: false

volumes:
  open_webui_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${EXIST_NFS_SERVER_ADDRESS},nolock,soft,rw,nfsvers=4"
      device: ":${EXIST_NFS_BASE_PATH}/open_webui_data"

networks:
  exist:
    external: true
