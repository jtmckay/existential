services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:v0.9.6
    # open-webui starts as root then drops to UID/GID — user: breaks its startup script
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - exist
    # ports disabled — access via https://open-webui.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - "11488:8080"
    environment:
      UID: "${EXIST_PUID:-1000}"
      GID: "${EXIST_PGID:-1000}"
      WEBUI_ADMIN_NAME: ${OPEN_WEBUI_ADMIN_NAME}
      WEBUI_ADMIN_EMAIL: ${OPEN_WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${OPEN_WEBUI_ADMIN_PASSWORD}
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY}
      OPENAI_API_BASE_URLS: "http://hermes-agent:8642/v1"
      OPENAI_API_KEYS: "${OPEN_WEBUI_HERMES_API_KEY:-}"
      # Disable direct Ollama integration — hermes-agent is the primary backend
      ENABLE_OLLAMA_API: "false"
      # Point STT at the WhisperX service (OpenAI-compatible /v1 endpoint) instead
      # of running a second STT instance. Voice input is single-speaker, so it uses
      # the plain transcription path — diarization is for the automations pipeline.
      AUDIO_STT_ENGINE: openai
      AUDIO_STT_OPENAI_API_BASE_URL: http://whisperx:8000/v1
      AUDIO_STT_OPENAI_API_KEY: "none"
    # The image's default healthcheck fails during the all-MiniLM-L6-v2 embedding
    # model download (several minutes on first boot). Override with a long
    # start_period so the container stays "starting" (not "unhealthy") while
    # the model downloads. The interval/retries keep ticking once the grace
    # period expires; a running server answers /health quickly after that.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    volumes:
      # SQLite (webui.db) + Chroma vector store — must be local; NFS breaks both.
      # TODO: backup sidecar → volumes/open_webui_data_backup (no sidecar yet).
      - ../../volumes_local/open_webui_data:/app/backend/data

networks:
  exist:
    external: true
