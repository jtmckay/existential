services:
  # LLM and OCR
  # Status check at http://localhost:11434/
  ollama:
    container_name: ollama
    image: ollama/ollama

    # AMD GPU
    # privileged: true # needed for GPU
    # environment:
    #   - OLLAMA_VULKAN=1

    # NVIDIA GPU or CPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # or a number, e.g. 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    restart: unless-stopped
    # networks:
    #   - exist
    ports:
      - 11434:11434 # Ollama's default API port

    volumes:
      - ./Modelfile:/root/Modelfile
      - ollama_data:/root/.ollama
      - ./entrypoint.sh:/entrypoint.sh:Z # Mount the script
    entrypoint: ["/entrypoint.sh"] # Use the custom script

volumes:
  ollama_data:

