services:
  # LLM and OCR
  # Status check at http://ollama:11434/api/tags
  ollama:
    container_name: ollama
    image: ollama/ollama:0.30.7

    # AMD GPU
    # privileged: true # needed for GPU
    # environment:
    #   - OLLAMA_VULKAN=1

    # NVIDIA GPU or CPU
    deploy:
      resources:
        limits:
          memory: 16G   # Adjust up for large models (e.g. 32G for 70B+)
        reservations:
          devices:
            - driver: nvidia
              count: all # or a number, e.g. 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - exist
    # ports disabled — access via https://ollama.internal (Caddy + pihole required)
    # Uncomment to expose directly:
    #   ports:
    #     - 11434:11434

    command: ["ollama", "serve"]
    volumes:
      # Downloaded models — re-pullable, tier-3 (not backed up). The ollama-decree
      # sidecar runs model routines, not a backup of this dir.
      - ./ollama_data:/root/.ollama

  ollama-decree:
    container_name: ollama-decree
    image: existential/decree:local  # shared image, built by existential-adhoc
    pull_policy: never
    user: "${EXIST_PUID:-1000}:${EXIST_PGID:-1000}"
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - exist
    environment:
      - DECREE_DAEMON=true
      - DECREE_SIDECAR=true
      - DECREE_INTERVAL=2
      - IN_CONTAINER=1
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./decree:/work/.decree:z
      - ./exist.test.sh:/work/.decree/exist.test.sh:ro,z
      - ../../automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ../../automations/lib:/work/.decree/lib:ro,z
      - ../../automations/runs:/work/.decree/runs:z
      - ../../automations/secrets:/secrets:ro,z
    tty: false

networks:
  exist:
    external: true
