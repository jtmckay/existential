services:
  existential-adhoc:
    container_name: existential-adhoc
    build:
      context: ./automations
    restart: "no"
    environment:
      - IN_CONTAINER=1
      - DECREE_DIR=/work/.decree
      - SECRETS_DIR=/secrets
      - NTFY_TOKEN=${EXIST_NTFY_TOKEN:-}
      - NTFY_URL=${EXIST_NTFY_URL:-}
    volumes:
      - ./automations/lib:/work/.decree/lib:ro,z
      - ./automations/routines:/work/.decree/routines:ro,z
      - ./automations/runs:/work/.decree/runs:z
      - ./automations/secrets:/secrets:z
      - ./src:/src:z
      - .:/repo:z

    networks:
      - exist
    tty: true
    stdin_open: true

networks:
  exist:
    driver: bridge
