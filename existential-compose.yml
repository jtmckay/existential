services:
  existential-adhoc:
    container_name: existential-adhoc
    build:
      context: ./automations
    # Canonical build of the decree image. Tagged so the main decree daemon and
    # every <slug>-decree sidecar can reference it via `image:` instead of each
    # re-building automations/Dockerfile into its own per-project image.
    image: existential/decree:local
    pull_policy: never
    restart: "no"
    # adhoc runs ephemeral one-shots (--entrypoint ""), never the decree daemon,
    # so the image's daemon HEALTHCHECK (PID 1 == decree) never applies here.
    healthcheck:
      disable: true
    environment:
      - IN_CONTAINER=1
      - DECREE_DIR=/work/.decree
      - SECRETS_DIR=/secrets
      - NTFY_TOKEN=${EXIST_NTFY_TOKEN:-}
      - NTFY_URL=${EXIST_NTFY_URL:-}
    volumes:
      - ./automations/lib:/work/.decree/lib:ro,z
      - ./automations/shared_routines:/work/.decree/shared_routines:ro,z
      - ./automations/runs:/work/.decree/runs:z
      - ./automations/secrets:/secrets:z
      - ./src:/src:z
      - .:/repo:z

    networks:
      - exist
    tty: true
    stdin_open: true

networks:
  exist:
    driver: bridge
