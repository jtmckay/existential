name: Notes Sync
tagline: Compile and sync your Logseq notes from Nextcloud to Dropbox every 10 minutes
e2e: false
services:
  - var: EXIST_IS_SERVICES_DECREE
    label: Decree
  - var: EXIST_IS_NAS_NEXTCLOUD
    label: Nextcloud
copies:
  - src: services/decree/decree/cron.example/notes.md
    dst: services/decree/decree/cron/
    label: "decree: notes.md (every 10 minutes)"
    requires: EXIST_IS_SERVICES_DECREE
guide: |
  Activates a recurring cron that pulls notes from Nextcloud, compiles them,
  generates an index, and pushes the result to Dropbox — all inside Decree,
  every 10 minutes.

  Pipeline each run:
    1. Pull from Nextcloud  (automations/lib/notes/pull-nextcloud.sh)
    2. Compile notes        (automations/lib/notes/compile-notes.sh)
    3. Generate index       (automations/lib/notes/generate-index.sh)
    4. Push to Dropbox      (automations/lib/notes/push-dropbox.sh)

  Prerequisites:
    - Nextcloud running (Quest 1 — NAS Storage)
    - Dropbox rclone remote configured:
        ./existential.sh run rclone
    - Nextcloud rclone credentials in automations/secrets/
    - Enable the notes routine in services/decree/decree/config.yml:
        notes:
          enabled: true

  After activating the cron, restart decree:
    docker compose restart decree

  Logs for each run land in automations/runs/ and are queryable in Grafana
  via the Decree Overview dashboard.
