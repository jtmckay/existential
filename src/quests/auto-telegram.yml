name: Telegram Bot
tagline: Connect a Telegram bot to Decree for notifications and image ingestion
services:
  - var: EXIST_IS_SERVICES_DECREE
    label: Decree
copies:
  - src: services/decree/decree/cron.example/telegram-poll.md
    dst: services/decree/decree/cron/
    label: "decree: telegram-poll.md"
    requires: EXIST_IS_SERVICES_DECREE
guide: |
  Create a Telegram bot and wire it to Decree. Once connected, Decree can
  send you transaction notifications and receive photos for OCR processing.
  Docs: https://existential.company/docs/integrations/telegram

  Setup:
    1. Message @BotFather on Telegram to create a bot. Copy the token.

    2. Write the token to automations/secrets/telegram/credentials.env:
           TELEGRAM_BOT_TOKEN=<your-token>

    3. Get your chat ID: send a message to your bot, then run:
           docker exec decree decree run telegram-ingest

    4. Add TELEGRAM_CHAT_ID to the credentials file.

  The telegram-poll cron (copied above) polls for new photo messages
  every 30 minutes and routes them to MinIO for downstream processing.
