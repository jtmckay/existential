name: Local AI Lab
tagline: Chat with local LLMs, transcribe audio, connect tools to your AI
e2e: true
services:
  - var: EXIST_IS_AI_OLLAMA
    label: Ollama
  - var: EXIST_IS_AI_OPEN_WEBUI
    label: Open WebUI
  - var: EXIST_IS_AI_MCP
    label: MCP
  - var: EXIST_IS_AI_HERMES
    label: Hermes
  - var: EXIST_IS_AI_WHISPERX
    label: WhisperX
  - var: EXIST_IS_AI_LIGHTRAG
    label: LightRAG
  - var: EXIST_IS_AI_CHATTERBOX
    label: Chatterbox
  - var: EXIST_IS_AI_COMFYUI
    label: ComfyUI
guide: |
  After `docker compose up -d`, pull Ollama models and set up ComfyUI:

  ── Ollama: pull models ────────────────────────────────────────────────────

  Pull the models used by this stack (gemma4:26b, qwen2.5:7b, bge-m3):
    ./existential.sh run ollama pull-models

  This may take 10–30 minutes depending on connection speed. Models are
  stored in the ollama_data volume and survive container restarts.

  To pull individual models manually:
    docker exec ollama ollama pull <model>
    docker exec ollama ollama list

  ── ComfyUI: download checkpoints ─────────────────────────────────────────

  ComfyUI runs at https://comfyui.internal after containers are up.
  It ships with no models — download one via the ComfyUI Manager node
  in the UI, or place .safetensors files directly in:
    volumes/comfyui_data/models/checkpoints/

  Recommended starting model: SDXL base (6.9 GB from civitai.com or HuggingFace).

copies:
  - src: ai/hermes/decree/cron.example/volume-backup-nightly.md
    dst: ai/hermes/decree/cron/
    label: "hermes: volume-backup-nightly.md"
    requires: EXIST_IS_AI_HERMES
  - src: ai/hermes/decree/cron.example/volume-backup-weekly.md
    dst: ai/hermes/decree/cron/
    label: "hermes: volume-backup-weekly.md"
    requires: EXIST_IS_AI_HERMES
  - src: ai/lightrag/decree/cron.example/volume-backup-nightly.md
    dst: ai/lightrag/decree/cron/
    label: "lightrag: volume-backup-nightly.md"
    requires: EXIST_IS_AI_LIGHTRAG
  - src: ai/lightrag/decree/cron.example/volume-backup-weekly.md
    dst: ai/lightrag/decree/cron/
    label: "lightrag: volume-backup-weekly.md"
    requires: EXIST_IS_AI_LIGHTRAG
